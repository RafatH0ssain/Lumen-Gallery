<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Lumen Gallery — an endless corridor through the Art Institute of Chicago's open collection, with docent notes written by AI."
    />
    <title>Lumen Gallery</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230e0e0d'/%3E%3Crect x='20' y='22' width='16' height='56' fill='%23f3efe3'/%3E%3Crect x='20' y='62' width='38' height='16' fill='%23f3efe3'/%3E%3Crect x='64' y='22' width='16' height='16' fill='%23d8231f'/%3E%3C/svg%3E"
    />
    <meta name="theme-color" content="#0e0e0d" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts load async so text renders immediately in the fallback face;
         display=swap upgrades in place. Removes ~1.3s of render blocking.
         One family (Archivo) now carries body and display weights. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <!-- crossorigin: the search fetch is a CORS request and can only reuse
         a preconnected socket opened in CORS mode. Images are no-cors, so
         the www host preconnect stays credentialless. -->
    <link rel="preconnect" href="https://api.artic.edu" crossorigin />
    <link rel="preconnect" href="https://www.artic.edu" />
    <script>
      // LCP: the first artwork can't paint until the first explore request
      // returns, so fire it here — in flight while the app bundle is still
      // downloading. Consumed once by useFeed via resolveBootPage().
      // KEEP IN SYNC with fetchExplorePage()/FIELDS/MAX_RANDOM_PAGE in
      // src/lib/aic.js: same query, same fields, page in [1, 83].
      (function () {
        var page = 1 + Math.floor(Math.random() * 83);
        // Once the page data arrives, preload the first artwork's image with
        // the exact srcset/sizes ArtCard will render, so the LCP image is
        // downloading while React is still booting. KEEP IN SYNC with the
        // <img> in src/components/ArtCard.jsx and imageUrl() in src/lib/aic.js.
        function preloadFirstImage(res) {
          res
            .clone()
            .json()
            .then(function (j) {
              var first = (j.data || []).filter(function (a) {
                return a.image_id;
              })[0];
              if (!first) return;
              // Same width formula as feedImageWidth() in src/lib/aic.js.
              var slot = Math.min((window.innerWidth || 672) - 40, 632);
              var density = Math.min(window.devicePixelRatio || 1, 1.5);
              var w = Math.min(843, Math.ceil((slot * density) / 50) * 50);
              var l = document.createElement("link");
              l.rel = "preload";
              l.as = "image";
              l.fetchPriority = "high";
              l.href =
                "https://www.artic.edu/iiif/2/" +
                first.image_id +
                "/full/" +
                w +
                ",/0/default.jpg";
              document.head.appendChild(l);
            })
            .catch(function () {});
          return res;
        }
        window.__lumenBoot = {
          visitedPages: new Set([page]),
          firstPage: fetch("https://api.artic.edu/api/v1/artworks/search", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              query: {
                bool: {
                  must: [
                    { term: { is_public_domain: true } },
                    { exists: { field: "image_id" } },
                  ],
                },
              },
              fields:
                "id,title,artist_display,date_display,medium_display,image_id,style_title,subject_titles,classification_titles,thumbnail",
              page: page,
              limit: 12,
            }),
          }).then(preloadFirstImage),
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
